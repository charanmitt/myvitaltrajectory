<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyVitalTrajectory | Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:radial-gradient(circle at top,#3c1361 0%,#14001f 35%,#050505 100%);
}

/* Background Glow */

body::before{
    content:"";
    position:absolute;
    width:700px;
    height:700px;
    background:#8a2be2;
    filter:blur(220px);
    opacity:.25;
    border-radius:50%;
    top:-250px;
}

body::after{
    content:"";
    position:absolute;
    width:450px;
    height:450px;
    background:#6d28d9;
    filter:blur(180px);
    opacity:.20;
    bottom:-150px;
    right:-100px;
    border-radius:50%;
}

/* Corner Lines */

.corner1,
.corner2{
    position:absolute;
    width:300px;
    height:4px;
    background:#9d4dff;
    box-shadow:0 0 20px #b066ff;
}

.corner1{
    top:60px;
    left:-80px;
    transform:rotate(-40deg);
}

.corner2{
    bottom:60px;
    right:-80px;
    transform:rotate(-40deg);
}

/* Center */

.container{
    text-align:center;
    z-index:10;
}

.line{
    width:450px;
    height:2px;
    background:#b266ff;
    margin:25px auto;
    box-shadow:0 0 20px #b266ff;
}

/* Title */

h1{
    font-size:110px;
    letter-spacing:8px;
    color:transparent;
    -webkit-text-stroke:2px #d9b3ff;
    text-shadow:
        0 0 10px #8a2be2,
        0 0 30px #8a2be2,
        0 0 60px #6d28d9;
    animation:glow 2s infinite alternate;
}

h2{
    margin-top:15px;
    font-size:55px;
    color:#b266ff;
    font-weight:300;
    letter-spacing:8px;
}

.tagline{
    margin-top:35px;
    color:#dddddd;
    font-size:20px;
}

.company{
    margin-top:15px;
    color:#b266ff;
    font-size:24px;
    font-weight:600;
}

@keyframes glow{

    from{
        text-shadow:
        0 0 10px #8a2be2,
        0 0 30px #8a2be2;
    }

    to{
        text-shadow:
        0 0 25px #d946ef,
        0 0 70px #9333ea,
        0 0 120px #6d28d9;
    }

}

/* Responsive */

@media(max-width:768px){

h1{
font-size:60px;
}

h2{
font-size:30px;
}

.line{
width:280px;
}

.tagline{
font-size:16px;
padding:0 20px;
}

.company{
font-size:18px;
}

}

</style>

</head>

<body>

<div class="corner1"></div>
<div class="corner2"></div>

<div class="container">

<div class="line"></div>

<h1>COMING</h1>

<h2>SOON....</h2>

<div class="line"></div>

<p class="tagline">
Building the future of AI-powered healthcare.
</p>

<p class="company">
MyVitalTrajectory
</p>

</div>

</body>
</html>

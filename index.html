<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{height:100vh;display:flex;justify-content:center;align-items:center;background:radial-gradient(circle at top,#5b21b6,#180424 45%,#050505 100%);overflow:hidden;color:#fff}
body:before,body:after{content:"";position:absolute;border-radius:50%;filter:blur(120px);opacity:.25}
body:before{width:500px;height:500px;background:#8b5cf6;top:-180px;left:-120px}
body:after{width:400px;height:400px;background:#a855f7;bottom:-150px;right:-120px}
.card{position:relative;z-index:2;background:rgba(255,255,255,.05);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.1);padding:60px 40px;border-radius:24px;width:min(90%,700px);text-align:center;box-shadow:0 0 40px rgba(168,85,247,.25)}
.small{letter-spacing:4px;color:#d8b4fe;font-size:18px}
h1{margin:10px 0;font-size:72px;letter-spacing:6px;text-shadow:0 0 10px #a855f7,0 0 30px #7c3aed;animation:glow 2s infinite alternate}
@keyframes glow{from{text-shadow:0 0 10px #a855f7,0 0 30px #7c3aed}to{text-shadow:0 0 20px #e879f9,0 0 60px #9333ea}}
p{color:#ddd;font-size:18px;line-height:1.7;margin-top:15px}
.brand{margin-top:18px;color:#d8b4fe;font-weight:700;font-size:28px}
.btn{display:inline-block;margin-top:35px;padding:15px 34px;border-radius:999px;text-decoration:none;color:#fff;font-weight:700;background:linear-gradient(135deg,#6d28d9,#a855f7);box-shadow:0 0 20px rgba(168,85,247,.6);transition:.3s}
.btn:hover{transform:translateY(-4px) scale(1.04)}
footer{margin-top:30px;color:#bdbdbd;font-size:14px}
@media(max-width:768px){h1{font-size:46px}.brand{font-size:22px}p{font-size:16px}}
</style></head>
